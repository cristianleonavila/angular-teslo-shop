<h1 class="text-2xl font-bold">{{ product().title }}</h1>
<div class="divider"></div>

<form class="grid grid-cols-1 sm:grid-cols-2 gap-4" [formGroup]="productForm" (submit)="onSubmit()">
  <!-- Datos generales -->
  <div class="flex flex-col gap-2">
    <h2 class="text-2xl font-bold h-12">Datos generales</h2>
    <input
      type="text"
      placeholder="Título"
      class="input input-bordered w-full"
      formControlName="title"
      [class.border-red-500]="productForm.get('title')?.errors ?? false"
    />
    <app-form-error [control]="productForm.get('title')!"></app-form-error>

    <input type="text"
           placeholder="Slug"
           class="input input-bordered w-full"
           formControlName="slug"
           [class.border-red-500]="productForm.get('slug')?.errors ?? false"/>
    <app-form-error [control]="productForm.get('slug')!"></app-form-error>
    <textarea
      class="textarea textarea-bordered"
      placeholder="Descripción"
      rows="6"
      formControlName="description"
      [class.border-red-500]="productForm.get('description')?.errors ?? false"
    ></textarea>
    <app-form-error [control]="productForm.get('description')!"></app-form-error>

    <h2 class="text-lg font-bold">Datos de venta</h2>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
        <div>
        <input
          min="1"
          type="number"
          placeholder="Precio"
          class="input input-bordered w-full"
          formControlName="price"
          [class.border-red-500]="productForm.get('price')?.errors ?? false"
        />
        <app-form-error [control]="productForm.get('price')!"></app-form-error>
      </div>
      <div>
        <input
          min="1"
          type="number"
          placeholder="Inventario"
          class="input input-bordered w-full"
          formControlName="stock"
          [class.border-red-500]="productForm.get('stock')?.errors ?? false"
        />
        <app-form-error [control]="productForm.get('stock')!"></app-form-error>
      </div>
    </div>

    <!-- tags -->
    <input type="text"
            placeholder="Tags"
            class="input input-bordered w-full"
            formControlName="tags"
            [class.border-red-500]="productForm.get('tags')?.errors ?? false"/>
    <app-form-error [control]="productForm.get('tags')!"></app-form-error>
    <!-- Botones para el género -->
    <div class="grid grid-cols-4 gap-2">
      <!-- <button class="btn btn-sm btn-outline">Masculino</button> -->
      <button class="btn btn-sm" type="button" [class.btn-primary]="productForm.value.gender === 'men'" (click)="productForm.patchValue({ gender: 'men'})">Masculino</button>
      <button class="btn btn-sm" type="button" [class.btn-accent]="productForm.value.gender === 'women'" (click)="productForm.patchValue({ gender: 'women'})">Femenino</button>
      <button class="btn btn-sm" type="button" [class.btn-secondary]="productForm.value.gender === 'unisex'" (click)="productForm.patchValue({ gender: 'unisex'})">Unisex</button>
      <button class="btn btn-sm" type="button" [class.btn-warning]="productForm.value.gender === 'kid'" (click)="productForm.patchValue({ gender: 'kid'})">Kid</button>
    </div>

    <!-- <select class="select select-bordered w-full">
      <option value="male">Masculino</option>
      <option value="female">Femenino</option>
      <option value="unisex">Unisex</option>
    </select> -->

    <!-- Sizes -->
    <div class="grid grid-cols-6 gap-2">
      @for (size of sizes; track size) {
      <button class="btn btn-sm"
              type="button"
              (click)="onSizeChange(size)"
              [class.btn-primary]="productForm.value.sizes?.includes(size)">{{ size }}</button>
      }
    </div>
  </div>

  <!-- Imágenes -->
  <div class="flex flex-col gap-2">
    <div class="flex justify-end h-12">
      <button class="btn btn-secondary" type="submit">
        <!-- <span class="loading loading-spinner loading-sm"></span> -->

        Guardar
      </button>
    </div>

    <app-product-carousel [images]="imagesToCarousel()" />

    <input type="file"
           class="file-input file-input-bordered w-full mt-4"
           multiple
           accept="image/*"
           (change)="onFilesChanged($event)"
           />

    <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
      @for (image of tempImages(); track $index) {
        <img [src]="image" class="w-full object-cover rounded-xl">
      }
    </div>
  </div>
</form>

@if (wasSaved()) {
<div class="alert alert-success fixed bottom-4 right-4 w-80 animated-fadeIn">
  <span>
    Datos actualizados correctamente
  </span>
</div>
}
